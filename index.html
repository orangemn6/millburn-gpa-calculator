<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weighted GPA Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            margin: 20px; 
            background-color: #121212; 
            color: #ffffff;
            text-align: center;
        }
        .container { 
            max-width: 800px; 
            margin: auto; 
            background: #1e1e1e; 
            padding: 20px; 
            border-radius: 10px; 
            box-shadow: 0px 0px 10px rgba(255, 255, 255, 0.1);
        }
        .header {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .courses-container { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 10px; 
            justify-content: center;
        }
        .course { 
            border: 1px solid #ccc; 
            padding: 10px; 
            width: 250px; 
            background: #2a2a2a; 
            border-radius: 5px;
        }
        label, select, input { 
            display: block; 
            margin: 5px 0;
            color: #ffffff;
        }
        button { 
            margin-top: 10px; 
            padding: 10px 15px;
            background: #6200ea;
            color: #ffffff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #3700b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">Weighted GPA Calculator</div>
        <form id="gpaForm">
            <div class="courses-container" id="gradesContainer"></div>
            <button type="button" onclick="addCourse()">Add Course</button>
            <button type="button" onclick="calculateGPA()">Calculate GPA</button>
        </form>
        <h3 id="result"></h3>
    </div>
    
    <script>
        const gradeScale = {
            'CPA': { 'A': 4.33, 'A-': 4.0, 'B+': 3.66, 'B': 3.33, 'B-': 3.0, 'C+': 2.66, 'C': 2.33, 'C-': 2.0, 'D+': 1.66, 'D': 1.33, 'D-': 1.0, 'F': 0.0 },
            'ACC': { 'A': 4.66, 'A-': 4.33, 'B+': 4.0, 'B': 3.66, 'B-': 3.33, 'C+': 3.0, 'C': 2.66, 'C-': 2.33, 'D+': 2.0, 'D': 1.66, 'D-': 1.33, 'F': 0.0 },
            'AP': { 'A': 5.0, 'A-': 4.66, 'B+': 4.33, 'B': 4.0, 'B-': 3.66, 'C+': 3.33, 'C': 3.0, 'C-': 2.66, 'D+': 2.33, 'D': 2.0, 'D-': 1.66, 'F': 0.0 }
        };
        
        function addCourse() {
            let container = document.getElementById('gradesContainer');
            let div = document.createElement('div');
            div.classList.add('course');
            div.innerHTML = `
                <label>Class Name:
                    <input type="text" class="class-name" placeholder="Enter class name">
                </label>
                <label>Class Level:
                    <select class="level">
                        <option value="CPA">CPA</option>
                        <option value="ACC">ACC</option>
                        <option value="AP">AP</option>
                    </select>
                </label>
                <label>Q1 Grade:
                    <select class="grade">
                        ${Object.keys(gradeScale['CPA']).map(grade => `<option value="${grade}">${grade}</option>`).join('')}
                    </select>
                </label>
                <label>Q2 Grade:
                    <select class="grade">
                        ${Object.keys(gradeScale['CPA']).map(grade => `<option value="${grade}">${grade}</option>`).join('')}
                    </select>
                </label>
                <label>Q3 Grade (Optional):
                    <select class="grade">
                        <option value="">--</option>
                        ${Object.keys(gradeScale['CPA']).map(grade => `<option value="${grade}">${grade}</option>`).join('')}
                    </select>
                </label>
                <label>Q4 Grade (Optional):
                    <select class="grade">
                        <option value="">--</option>
                        ${Object.keys(gradeScale['CPA']).map(grade => `<option value="${grade}">${grade}</option>`).join('')}
                    </select>
                </label>
            `;
            container.appendChild(div);
        }
        
        function calculateGPA() {
            let courses = document.querySelectorAll('.course');
            let totalGPA = 0;
            let count = 0;
            
            courses.forEach(course => {
                let level = course.querySelector('.level').value;
                let grades = Array.from(course.querySelectorAll('.grade')).map(select => select.value).filter(grade => grade !== "");
                
                let sum = grades.reduce((acc, grade) => acc + gradeScale[level][grade], 0);
                let avg = sum / grades.length;
                
                totalGPA += avg;
                count++;
            });
            
            let finalGPA = totalGPA / count;
            document.getElementById('result').innerText = `Your Weighted GPA: ${finalGPA.toFixed(2)}`;
        }
    </script>
</body>
</html>
