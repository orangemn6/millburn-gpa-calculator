<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weighted GPA Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: auto;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .courses-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .course {
            border: 1px solid #ccc;
            padding: 15px;
            border-radius: 5px;
            background: #fafafa;
        }
        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }
        select, input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            border: none;
            border-radius: 5px;
            background: #007BFF;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        h3 {
            text-align: center;
            margin-top: 15px;
        }
        @media (max-width: 600px) {
            .container {
                width: 90%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Weighted GPA Calculator</h2>
        <form id="gpaForm">
            <div class="courses-container" id="gradesContainer"></div>
            <button type="button" onclick="addCourse()">Add Course</button>
            <button type="button" onclick="calculateGPA()">Calculate GPA</button>
        </form>
        <h3 id="result"></h3>
        <h3 id="unweightedResult"></h3>
    </div>
    
    <script>
        const gradeScale = {
            'CPA': { 'A': 4.33, 'A-': 4.0, 'B+': 3.66, 'B': 3.33, 'B-': 3.0, 'C+': 2.66, 'C': 2.33, 'C-': 2.0, 'D+': 1.66, 'D': 1.33, 'D-': 1.0, 'F': 0.0 },
            'ACC': { 'A': 4.66, 'A-': 4.33, 'B+': 4.0, 'B': 3.66, 'B-': 3.33, 'C+': 3.0, 'C': 2.66, 'C-': 2.33, 'D+': 2.0, 'D': 1.66, 'D-': 1.33, 'F': 0.0 },
            'AP': { 'A': 5.0, 'A-': 4.66, 'B+': 4.33, 'B': 4.0, 'B-': 3.66, 'C+': 3.33, 'C': 3.0, 'C-': 2.66, 'D+': 2.33, 'D': 2.0, 'D-': 1.66, 'F': 0.0 }
        };
        
        const unweightedScale = { 'A': 4.0, 'A-': 3.66, 'B+': 3.33, 'B': 3.0, 'B-': 2.66, 'C+': 2.33, 'C': 2.0, 'C-': 1.66, 'D+': 1.33, 'D': 1.0, 'D-': 0.66, 'F': 0.0 };
        
        function addCourse() {
            let container = document.getElementById('gradesContainer');
            let div = document.createElement('div');
            div.classList.add('course');
            div.innerHTML = `
                <label>Class Name:
                    <input type="text" class="class-name" placeholder="Enter class name">
                </label>
                <label>Class Level:
                    <select class="level">
                        <option value="CPA">CPA</option>
                        <option value="ACC">ACC</option>
                        <option value="AP">AP</option>
                    </select>
                </label>
                <label>Q1 Grade:
                    <select class="grade">
                        ${Object.keys(gradeScale['CPA']).map(grade => `<option value="${grade}">${grade}</option>`).join('')}
                    </select>
                </label>
                <label>Q2 Grade:
                    <select class="grade">
                        ${Object.keys(gradeScale['CPA']).map(grade => `<option value="${grade}">${grade}</option>`).join('')}
                    </select>
                </label>
            `;
            container.appendChild(div);
        }
        
        function calculateGPA() {
            let courses = document.querySelectorAll('.course');
            let totalWeightedGPA = 0, totalUnweightedGPA = 0, count = 0;
            
            courses.forEach(course => {
                let level = course.querySelector('.level').value;
                let grades = Array.from(course.querySelectorAll('.grade')).map(select => select.value).filter(grade => grade !== "");
                
                let sumWeighted = grades.reduce((acc, grade) => acc + gradeScale[level][grade], 0);
                let sumUnweighted = grades.reduce((acc, grade) => acc + unweightedScale[grade], 0);
                
                let avgWeighted = sumWeighted / grades.length;
                let avgUnweighted = sumUnweighted / grades.length;
                
                totalWeightedGPA += avgWeighted;
                totalUnweightedGPA += avgUnweighted;
                count++;
            });
            
            let finalWeightedGPA = totalWeightedGPA / count;
            let finalUnweightedGPA = totalUnweightedGPA / count;
            
            document.getElementById('result').innerText = `Your Weighted GPA: ${finalWeightedGPA.toFixed(2)}`;
            document.getElementById('unweightedResult').innerText = `Your Unweighted GPA: ${finalUnweightedGPA.toFixed(2)}`;
        }
    </script>
</body>
</html>
